<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test · Argentina en Números</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e14;--bg2:#111720;--bg3:#182030;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#e8edf5;--muted:#6b7a99;--faint:#3a4660;--accent:#4af0b0;--accent2:#3db8ff;--danger:#ff6b6b;--warn:#f0b84a;--fd:'Fraunces',serif;--fm:'DM Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--fm);font-size:13px;line-height:1.6}
nav{position:sticky;top:0;z-index:100;background:rgba(10,14,20,0.92);backdrop-filter:blur(12px);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:52px}
.nav-brand{font-family:var(--fd);font-size:17px;font-weight:600;color:var(--text);text-decoration:none}
.nav-brand span{color:var(--accent)}
.nav-links a{font-size:11px;color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:4px;letter-spacing:.04em;text-transform:uppercase;transition:color .2s}
.nav-links a:hover{color:var(--text)}
.nav-time{font-size:11px;color:var(--faint)}
.page{max-width:900px;margin:0 auto;padding:2rem 2rem 4rem}
.divider{height:0.5px;background:var(--border);margin:2.5rem 0}
.sec-hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1rem}
.sec-title{font-family:var(--fd);font-size:21px;font-weight:300;letter-spacing:-.01em}
.sec-title em{font-style:italic;color:var(--accent)}
.sec-src{font-size:10px;color:var(--faint);letter-spacing:.04em;text-transform:uppercase}
.grid{display:grid;gap:8px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
@media(max-width:680px){.g4,.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:400px){.g4,.g3,.g2{grid-template-columns:1fr}}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:8px;padding:.9rem 1rem;position:relative;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent)}
.card-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.card-val{font-family:var(--fd);font-size:24px;font-weight:600;color:var(--text);line-height:1.1}
.card-val.sm{font-size:19px}.card-val.xs{font-size:15px}
.card-val.loading{font-family:var(--fm);font-size:11px;color:var(--faint);font-weight:400;animation:blink 1.2s infinite}
.card-val.error{font-family:var(--fm);font-size:11px;color:var(--danger);font-weight:400}
@keyframes blink{0%,100%{opacity:.5}50%{opacity:1}}
.card-change{font-size:11px;margin-top:3px;color:var(--muted)}
.card-change.pos{color:var(--danger)}.card-change.neg{color:var(--accent)}
.chart-box{background:var(--bg2);border:0.5px solid var(--border);border-radius:8px;padding:1.1rem 1.1rem .9rem;margin-top:8px}
.chart-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem}
.chart-ttl{font-size:13px;font-weight:500;color:var(--text)}
.chart-src{font-size:10px;color:var(--faint)}
.tabs{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.tab{font-size:10px;padding:3px 9px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:var(--fm);text-transform:uppercase;letter-spacing:.04em;transition:all .15s}
.tab:hover{color:var(--text)}.tab.active{background:var(--bg3);color:var(--accent);border-color:var(--accent)}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--muted);margin-bottom:8px}
.legend span{display:flex;align-items:center;gap:4px}
.ldot{width:8px;height:8px;border-radius:2px}
.status{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--faint);padding:.75rem 0;border-top:0.5px solid var(--border);margin-top:1.5rem}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
.pulse.warn{background:var(--warn);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
footer{border-top:0.5px solid var(--border);padding:2rem;max-width:900px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
.f-brand{font-family:var(--fd);font-size:15px;font-weight:600;color:var(--muted)}
.f-brand span{color:var(--accent)}
footer p{font-size:10px;color:var(--faint);max-width:380px;line-height:1.6}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.page>*{animation:fadeUp .4s ease both}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:.5rem .75rem;border-bottom:0.5px solid var(--border2);text-align:right;white-space:nowrap}
thead th:first-child{text-align:left}
tbody tr{border-bottom:0.5px solid var(--border);transition:background .15s}
tbody tr:hover{background:var(--bg2)}
tbody td{padding:.45rem .75rem;text-align:right;color:var(--text)}
tbody td:first-child{text-align:left;color:var(--muted);font-size:11px}
.tbl-num{font-family:var(--fd);font-size:13px}
.tbl-empty{color:var(--faint);font-size:11px}
</style>
</head>
<body>
<nav>
  <a class="nav-brand" href="/">Argentina <span>en números</span></a>
  <div class="nav-links">
    <a href="/">← Index</a>
  </div>
  <span class="nav-time" id="nav-time"></span>
</nav>

<div class="page">
  <section>
    <div class="sec-hdr">
      <h2 class="sec-title">Producción de <em>petróleo</em></h2>
      <span class="sec-src">datos.energia.gob.ar · Cuenca Neuquina</span>
    </div>
    <div class="chart-box">
      <div class="chart-hdr"><span class="chart-ttl">Pampa Energía · m³ totales</span><span class="chart-src">datos.energia.gob.ar</span></div>
      <div style="position:relative;width:100%;height:200px"><canvas id="chartPampa"></canvas></div>
    </div>
    <div class="chart-box" style="margin-top:12px">
      <div class="chart-hdr"><span class="chart-ttl">Vista Energy · m³ totales</span><span class="chart-src">datos.energia.gob.ar</span></div>
      <div style="position:relative;width:100%;height:200px"><canvas id="chartVista"></canvas></div>
    </div>
    <div class="chart-box" style="margin-top:12px">
      <div class="chart-hdr"><span class="chart-ttl">GeoPark · m³ totales</span><span class="chart-src">datos.energia.gob.ar</span></div>
      <div style="position:relative;width:100%;height:200px"><canvas id="chartGeopark"></canvas></div>
    </div>
    <div class="chart-box" style="margin-top:12px">
      <div class="chart-hdr"><span class="chart-ttl">YPF · m³ totales</span><span class="chart-src">datos.energia.gob.ar</span></div>
      <div style="position:relative;width:100%;height:200px"><canvas id="chartYPF"></canvas></div>
    </div>
  </section>

  <div class="status">
    <span class="pulse" id="st-dot"></span>
    <span id="st-msg">Cargando…</span>
  </div>
</div>

<footer>
  <div class="f-brand">Test <span>page</span></div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
var $ = function(id) { return document.getElementById(id); };

function tick() {
  $('nav-time').textContent = new Date().toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit',second:'2-digit'}) + ' ART';
}
setInterval(tick, 1000); tick();

function safeGet(url) {
  return fetch(url, {signal: AbortSignal.timeout(12000)})
    .then(function(r) { if (!r.ok) return null; return r.json(); })
    .catch(function() { return null; });
}

/* --- Producción de petróleo · Cuenca Neuquina --- */

var EMPRESAS = {
  'PAMPA ENERGIA S.A.':                        'Pampa Energía',
  'VISTA ENERGY ARGENTINA SAU':                'Vista Energy',
  'VISTA OIL & GAS ARGENTINA SAU':             'Vista Energy',
  'Vista Oil & Gas Argentina SA':              'Vista Energy',
  'GEOPARK ARGENTINA S.A.':                   'GeoPark',
  'GEOPARK ARGENTINA LTD. (SUCURSAL ARGENTINA)': 'GeoPark',
  'YPF S.A.':                                  'YPF'
};
var COLS = ['Pampa Energía', 'Vista Energy', 'GeoPark', 'YPF'];
var RES  = '745facdc-73dc-46d8-83d5-d027bdaa3210';

function labelMes(indice) {
  var p = indice.split('-');
  var meses = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return meses[parseInt(p[1])] + ' ' + p[0].slice(2);
}

function loadPetroleo() {
  var sql = 'SELECT indice_tiempo, empresa, SUM(cantidad) as total_m3 ' +
    'FROM "' + RES + '" ' +
    'WHERE cuenca = \'NEUQUINA\' ' +
    'AND (empresa = \'PAMPA ENERGIA S.A.\' ' +
      'OR empresa = \'VISTA ENERGY ARGENTINA SAU\' ' +
      'OR empresa = \'VISTA OIL & GAS ARGENTINA SAU\' ' +
      'OR empresa = \'Vista Oil & Gas Argentina SA\' ' +
      'OR empresa = \'GEOPARK ARGENTINA S.A.\' ' +
      'OR empresa = \'GEOPARK ARGENTINA LTD. (SUCURSAL ARGENTINA)\' ' +
      'OR empresa = \'YPF S.A.\') ' +
    'AND idconcepto IN (1, 2, 10) ' +
    'GROUP BY indice_tiempo, empresa ' +
    'ORDER BY indice_tiempo DESC ' +
    'LIMIT 72';

  fetch('/api/energia', {
    method: 'POST',
    headers: {'Content-Type': 'application/json; charset=utf-8'},
    body: JSON.stringify({sql: sql}),
    signal: AbortSignal.timeout(15000)
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (!data.success) { showError(); return; }

    /* Agregar por mes y empresa normalizada */
    var meses = {};
    data.result.records.forEach(function(r) {
      var emp = EMPRESAS[r.empresa];
      if (!emp) return;
      if (!meses[r.indice_tiempo]) meses[r.indice_tiempo] = {};
      meses[r.indice_tiempo][emp] = (meses[r.indice_tiempo][emp] || 0) + Number(r.total_m3);
    });

    var keys = Object.keys(meses).sort(); /* asc para el gráfico */
    var labels = keys.map(labelMes);

    var cfgs = [
      { emp:'Pampa Energía', id:'chartPampa',   color:'rgba(74,240,176,.8)'  },
      { emp:'Vista Energy',  id:'chartVista',   color:'rgba(61,184,255,.8)'  },
      { emp:'GeoPark',       id:'chartGeopark', color:'rgba(240,184,74,.8)'  },
      { emp:'YPF',           id:'chartYPF',     color:'rgba(255,107,107,.8)' }
    ];

    function yFmt(v) {
      if (v >= 1e6) return (v/1e6).toFixed(1)+' MM';
      if (v >= 1e3) return Math.round(v/1e3)+'k';
      return v;
    }

    cfgs.forEach(function(cfg) {
      new Chart($(cfg.id), {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            data: keys.map(function(k) { return meses[k][cfg.emp] || 0; }),
            backgroundColor: cfg.color,
            borderRadius: 3,
            borderSkipped: false
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(ctx) {
                  return ' ' + yFmt(ctx.raw) + ' m³';
                }
              }
            }
          },
          scales: {
            x: { ticks: { color:'#6b7a99', font:{size:10,family:'DM Mono'}, maxRotation:45, autoSkip:true, maxTicksLimit:14 }, grid: { color:'rgba(255,255,255,0.04)' } },
            y: { ticks: { color:'#6b7a99', font:{size:10,family:'DM Mono'}, callback: yFmt }, grid: { color:'rgba(255,255,255,0.05)' } }
          }
        }
      });
    });

    $('st-dot').className = 'pulse';
    $('st-msg').textContent = 'Actualizado · datos.energia.gob.ar · Cuenca Neuquina';
  })
  .catch(function() { showError(); });
}

function showError() {
  $('st-dot').className = 'pulse warn';
  $('st-msg').textContent = 'Error al cargar datos';
}

loadPetroleo();

</script>
</body>
</html>
